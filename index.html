<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Vercel Website</title>
  <meta name="description" content="Simple HTML template for Vercel" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    header {
      background: #111827;
      color: white;
      padding: 1.5rem;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: 3rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    footer {
      margin-top: 4rem;
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Website</h1>
    <p>Deployed with Vercel 🚀</p>
  </header>

  <main>
    <h2>Welcome</h2>
    <p>
      This is a simple HTML template you can use as a starting point.
      Customize the content, styles, and layout however you like.
    </p>

    <a href="#" class="btn">Get Started</a>
  </main>

  <footer>
    © 2026 Your Name. All rights reserved.
  </footer>

</body>
</html>
