<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drumadon — Drum Lessons</title>
  <!--
    Customization section: edit the variables below to change colors, sizes, and text.
    - Edit CSS variables in the <style> block under "/* CUSTOMIZE */".
    - Edit the `CONTENT` object in the <script> block to change visible text.
  -->
  <style>
    /* ===== CUSTOMIZE ===== */
    :root{
      /* Palette */
      --bg: #0b0b0b;        /* page background (black) */
      --panel: #121212;     /* panel background (near-black) */
      --muted: #9b9b9b;     /* grey text */
      --text: #ffffff;      /* main text (white) */
      --accent: #ff5a3c;    /* accent colour (changeable) */

      /* Sizes */
      --max-width: 1100px;  /* page content width */
      --radius: 12px;       /* rounded corners */
      --gap: 24px;          /* global gap */
      --hero-size: 48px;    /* hero heading size (px) */
      --lead-size: 18px;    /* intro/lead text size (px) */
    }
    /* ===== END CUSTOMIZE ===== */

    /* Reset & base */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background:linear-gradient(180deg,var(--bg),#050505 60%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.35;
    }

    /* Layout container */
    .wrap{
      max-width:var(--max-width);
      margin:40px auto;
      padding:32px;
      display:flex;
      gap:var(--gap);
      align-items:flex-start;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      width:100%;
      padding:18px 0;
    }

    .brand{display:flex;align-items:center;gap:14px}
    .logo{
      width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff8a6a);
      display:grid;place-items:center;font-weight:700;color:var(--panel);font-size:22px
    }
    .site-title{font-weight:700;font-size:18px}
    .site-sub{color:var(--muted);font-size:13px}

    main{display:flex;gap:var(--gap);width:100%}

    /* Left: hero */
    .hero{
      flex:1 1 600px;
      background:rgba(255,255,255,0.02);
      border-radius:var(--radius);
      padding:36px;
    }
    .hero h1{margin:0 0 10px;font-size:var(--hero-size);letter-spacing:-0.02em}
    .hero p.lead{margin:0 0 18px;color:var(--muted);font-size:var(--lead-size)}
    .cta{display:inline-flex;gap:12px;align-items:center;padding:12px 18px;border-radius:10px;background:var(--accent);color:var(--panel);font-weight:600;text-decoration:none}

    /* Right: quick card */
    .card{
      width:320px;
      background:var(--panel);
      border-radius:var(--radius);
      padding:20px;
      color:var(--text);
      box-shadow:0 6px 18px rgba(0,0,0,0.6);
      flex-shrink:0;
    }
    .card h3{margin:0 0 6px}
    .muted{color:var(--muted);font-size:14px}

    /* Services grid */
    .services{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}
    .service{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px}

    footer{margin-top:30px;color:var(--muted);font-size:13px}

    /* Small screens */
    @media (max-width:900px){
      .wrap{flex-direction:column;padding:20px}
      .card{width:100%}
      .services{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap" id="page">
    <header>
      <div class="brand">
        <div class="logo">D</div>
        <div>
          <div class="site-title" id="brandTitle">xxxx</div>
          <div class="site-sub" id="brandTag">xxxx</div>
        </div>
      </div>
      <nav>
        <a href="#contact" style="color:var(--muted);text-decoration:none;font-weight:600">Contact</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1 id="heroTitle">xxxx</h1>
        <p class="lead" id="heroLead">xxxx</p>
        <a class="cta" href="#contact" id="ctaText">xxxx</a>

        <div style="margin-top:22px;color:var(--muted)">
          <strong style="color:var(--text)">xxxx</strong>
          <div class="muted">xxxx</div>
        </div>
      </section>

      <aside class="card">
        <h3 id="cardTitle">xxxx</h3>
        <div class="muted" id="cardSub">xxxx</div>

        <div class="services" style="margin-top:12px">
          <div class="service">
            <strong>xxxx</strong>
            <div class="muted">xxxx</div>
          </div>
          <div class="service">
            <strong>xxxx</strong>
            <div class="muted">xxxx</div>
          </div>
          <div class="service">
            <strong>xxxx</strong>
            <div class="muted">xxxx</div>
          </div>
          <div class="service">
            <strong>xxxx</strong>
            <div class="muted">xxxx</div>
          </div>
        </div>

        <footer style="margin-top:16px">
          <div class="muted">xxxx</div>
        </footer>
      </aside>
    </main>
  </div>

  <script>
    // CONTENT: edit the values below to change text on the page.
    const CONTENT = {
      brandTitle: 'Drumadon',
      brandTag: 'Private drum lessons — modern, fun, effective',
      heroTitle: 'xxxx',
      heroLead: 'xxxx',
      ctaText: 'Book a lesson',
      cardTitle: 'Quick info',
      cardSub: 'xxxx',
      service1: {title:'One-to-one', desc:'xxxx'},
      service2: {title:'Online lessons', desc:'xxxx'},
      service3: {title:'Beginner courses', desc:'xxxx'},
      service4: {title:'Performance coaching', desc:'xxxx'},
      footerNote: 'xxxx'
    };

    // Apply content to DOM
    document.getElementById('brandTitle').textContent = CONTENT.brandTitle;
    document.getElementById('brandTag').textContent = CONTENT.brandTag;
    document.getElementById('heroTitle').textContent = CONTENT.heroTitle;
    document.getElementById('heroLead').textContent = CONTENT.heroLead;
    document.getElementById('ctaText').textContent = CONTENT.ctaText;
    document.getElementById('cardTitle').textContent = CONTENT.cardTitle;
    document.getElementById('cardSub').textContent = CONTENT.cardSub;

    // services
    const services = document.querySelectorAll('.service');
    const svc = [CONTENT.service1, CONTENT.service2, CONTENT.service3, CONTENT.service4];
    services.forEach((el,i)=>{
      el.querySelector('strong').textContent = svc[i].title || 'xxxx';
      el.querySelector('.muted').textContent = svc[i].desc || 'xxxx';
    });
    document.querySelector('.card footer .muted').textContent = CONTENT.footerNote;

    // Optional: expose a small API to change CSS variables from console
    window.Drumadon = {
      setColor(name, value){ document.documentElement.style.setProperty(name, value); },
      setSize(name, value){ document.documentElement.style.setProperty(name, value); },
      setText(key, value){ if(CONTENT[key]!==undefined){ CONTENT[key]=value; location.reload(); } }
    };
  </script>
</body>
</html>
