<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Title</title>
    <script>
        const config = {
            pageTitle: "Drumadon",
            brand: "Drumadon",
            nav1: "Home",
            nav2: "Services",
            nav3: "About",
            nav4: "Contact",
            heroHeading: "Welcome to Drumadon",
            heroSubtext: "Quality Drum Lessons in the hills",
            featuresHeading: "Services",
            feature1Title: "Resources",
            feature1Desc: "access free drum material",
            feature1Btn: "Learn More",
            feature2Title: "Free tiral",
            feature2Desc: "Book a free 30 minute trial lesson",
            feature2Btn: "Learn More",
            feature3Title: "Pricing",
            feature3Desc: "See the available lesson plans",
            feature3Btn: "Learn More",
            aboutHeading: "About Drumadon",
            aboutDesc: "drumadon is a great drum school bla bla bla i will fill this in when I can be fucked. Isaac is the best drum teacher in the world and you should totally take lessons from him because he is awesome and cool and fun and stuff. He teaches drums like no one else can. Seriously, you won't regret it.",
            contactHeading: "Contact Us",
            contactEmail: "info@drumadon.com.au",
            contactPhone: "0487 854 934",
            contactAddress: "5 Arthur rd Lesmurdie",
            footerText: "© 2026 Drumadon"
        };
    </script>
    <style>
        :root {
            --bg-color: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-color: #333333;
            --header-bg: rgba(51, 51, 51, 0.9);
            --header-text: #ffffff;
            --nav-hover: #ff6b6b;
            --hero-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --hero-text: #ffffff;
            --btn-bg: linear-gradient(45deg, #ff6b6b, #ffa500);
            --btn-text: #ffffff;
            --btn-hover: linear-gradient(45deg, #ffa500, #ff6b6b);
            --feature-bg: #ffffff;
            --about-bg: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --about-text: #ffffff;
            --contact-bg: #f8f9fa;
            --footer-bg: #343a40;
            --footer-text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --glow: 0 0 20px rgba(255, 107, 107, 0.5);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }
        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            color: var(--header-text);
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        nav ul li {
            margin: 0 1.5rem;
        }
        nav a {
            color: var(--header-text);
            text-decoration: none;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--nav-hover);
            text-shadow: 0 0 10px var(--nav-hover);
        }
        .hero {
            background: var(--hero-bg);
            color: var(--hero-text);
            padding: 8rem 2rem;
            text-align: center;
            margin-top: 4rem;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            animation: float 20s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: slideIn 1s, glow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.5); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.8); }
        }
        .hero p {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1.5s;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 1.2rem 3rem;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--glow);
        }
        .features {
            padding: 6rem 2rem;
            background: var(--contact-bg);
        }
        .features h2 {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 2.5rem;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .feature-card {
            background: var(--feature-bg);
            padding: 3rem 2rem;
            text-align: center;
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,107,107,0.1), rgba(255,165,0,0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feature-card:hover::before {
            opacity: 1;
        }
        .feature-card:hover {
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
        }
        .about {
            padding: 8rem 2rem;
            background: var(--about-bg);
            color: var(--about-text);
            text-align: center;
            position: relative;
        }
        .about h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .contact {
            padding: 6rem 2rem;
            background: var(--contact-bg);
            text-align: center;
        }
        .contact h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #ff6b6b;
        }
        footer {
            background: var(--footer-bg);
            color: var(--footer-text);
            text-align: center;
            padding: 3rem 2rem;
            position: relative;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500, #ff6b6b);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div id="brand"></div>
            <ul>
                <li><a href="#home" id="nav1"></a></li>
                <li><a href="#features" id="nav2"></a></li>
                <li><a href="#about" id="nav3"></a></li>
                <li><a href="#contact" id="nav4"></a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1 id="hero-heading"></h1>
        <p id="hero-subtext"></p>
    </section>

    <section id="features" class="features">
        <h2 id="features-heading"></h2>
        <div class="feature-grid">
            <div class="feature-card">
                <h3 id="feature1-title"></h3>
                <p id="feature1-desc"></p>
                <button class="btn" id="feature1-btn"></button>
            </div>
            <div class="feature-card">
                <h3 id="feature2-title"></h3>
                <p id="feature2-desc"></p>
                <button class="btn" id="feature2-btn"></button>
            </div>
            <div class="feature-card">
                <h3 id="feature3-title"></h3>
                <p id="feature3-desc"></p>
                <button class="btn" id="feature3-btn"></button>
            </div>
        </div>
    </section>

    <section id="about" class="about">
        <h2 id="about-heading"></h2>
        <p id="about-desc"></p>
    </section>

    <section id="contact" class="contact">
        <h2 id="contact-heading"></h2>
        <p id="contact-email"></p>
        <p id="contact-phone"></p>
        <p id="contact-address"></p>
    </section>

    <footer>
        <p id="footer-text"></p>
    </footer>

    <script>
        // Set page title
        document.title = config.pageTitle;

        // Set text content from config
        document.getElementById('brand').textContent = config.brand;
        document.getElementById('nav1').textContent = config.nav1;
        document.getElementById('nav2').textContent = config.nav2;
        document.getElementById('nav3').textContent = config.nav3;
        document.getElementById('nav4').textContent = config.nav4;
        document.getElementById('hero-heading').textContent = config.heroHeading;
        document.getElementById('hero-subtext').textContent = config.heroSubtext;
        document.getElementById('features-heading').textContent = config.featuresHeading;
        document.getElementById('feature1-title').textContent = config.feature1Title;
        document.getElementById('feature1-desc').textContent = config.feature1Desc;
        document.getElementById('feature1-btn').textContent = config.feature1Btn;
        document.getElementById('feature2-title').textContent = config.feature2Title;
        document.getElementById('feature2-desc').textContent = config.feature2Desc;
        document.getElementById('feature2-btn').textContent = config.feature2Btn;
        document.getElementById('feature3-title').textContent = config.feature3Title;
        document.getElementById('feature3-desc').textContent = config.feature3Desc;
        document.getElementById('feature3-btn').textContent = config.feature3Btn;
        document.getElementById('about-heading').textContent = config.aboutHeading;
        document.getElementById('about-desc').textContent = config.aboutDesc;
        document.getElementById('contact-heading').textContent = config.contactHeading;
        document.getElementById('contact-email').textContent = 'Email: ' + config.contactEmail;
        document.getElementById('contact-phone').textContent = 'Phone: ' + config.contactPhone;
        document.getElementById('contact-address').textContent = 'Address: ' + config.contactAddress;
        document.getElementById('footer-text').textContent = config.footerText;

        // Add scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'bounceIn 1s ease-out';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.feature-card').forEach(card => {
            observer.observe(card);
        });

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </script>
</body>
</html>
