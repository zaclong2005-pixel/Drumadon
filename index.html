<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drumadon - Drum Lessons</title>
  <style>
    /* Reset some default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #111; /* dark background */
      color: #eee; /* light text */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2rem;
      text-align: center;
      background-color: #222;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      color: #fff;
    }

    nav {
      margin-top: 1rem;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 1rem;
    }

    main h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    main p {
      font-size: 1.2rem;
      color: #ccc;
      max-width: 600px;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background-color: #222;
      font-size: 0.9rem;
      color: #888;
    }

    button {
      margin-top: 2rem;
      padding: 0.8rem 2rem;
      background-color: #fff;
      color: #111;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Drumadon</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#lessons">Lessons</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Master the Drums with Drumadon</h2>
    <p>Learn drums at your own pace with expert guidance. Whether you're a beginner or an advanced player, Drumadon helps you improve your skills and play with confidence.</p>
    <button onclick="location.href='#contact'">Get Started</button>
  </main>

  <footer>
    &copy; 2026 Drumadon. All rights reserved.
  </footer>
</body>
</html>
