<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drumadon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #e8e8e8;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #d0d0d0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        nav {
            background-color: #efefef;
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #d0d0d0;
        }

        nav a {
            margin: 0 1.5rem;
            text-decoration: none;
            color: #555;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #222;
        }

        main {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #444;
        }

        .hero p {
            font-size: 1.1rem;
            color: #666;
        }

        footer {
            background-color: #e8e8e8;
            padding: 2rem;
            text-align: center;
            margin-top: 4rem;
            border-top: 1px solid #d0d0d0;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>DRUMADON</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <main>
        <section class="hero">
            <h2>Drumadon</h2>
            <p>A bla bla bal good drum lessons.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Drumadon. All rights reserved.</p>
    </footer>
</body>
</html>
