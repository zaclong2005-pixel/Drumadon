<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xxxx - Website Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #808080; /* Grey background */
            font-family: Arial, sans-serif;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin-bottom: 40px;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ddd;
            font-size: 18px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #000000;
        }

        .btn-secondary {
            background-color: #000000;
        }

        .btn-secondary:hover {
            background-color: #000000;
        }

        .btn-tertiary {
            background-color: #000000;
        }

        .btn-tertiary:hover {
            background-color: #000000;
        }

        main {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        main h2 {
            color: #333;
            margin-bottom: 20px;
        }

        main p {
            line-height: 1.6;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>xxxx</h1>
            <!-- EDIT: Replace "xxxx" with your website title -->
            <p class="subtitle">xxxx</p>
            <!-- EDIT: Replace with your tagline or description -->
        </header>

        <div class="button-container">
            <!-- EDIT: Add/remove buttons as needed, change href paths and text -->
            <a href="xxxx.html" class="btn">Page One</a>
            <a href="xxxx.html" class="btn btn-secondary">Page Two</a>
            <a href="xxxx.html" class="btn btn-tertiary">Page Three</a>
            <a href="xxxx.html" class="btn">Page Four</a>
        </div>

        <main>
            <h2>Welcome to xxxx</h2>
            <!-- EDIT: Replace with your page heading -->
            <p>xxxx</p>
            <!-- EDIT: Replace with your main content -->
        </main>

        <footer>
            <p>&copy; 2026 xxxx. All rights reserved.</p>
            <!-- EDIT: Replace "xxxx" with your website/company name -->
        </footer>
    </div>
</body>
</html>
