<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drumadon - Drum Lessons</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #111;
      color: #fff;
      line-height: 1.6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #000;
      border-bottom: 2px solid #444;
    }

    header h1 {
      font-family: 'Helvetica', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 2rem;
      font-weight: bold;
    }

    nav a:hover {
      color: #aaa;
    }

    section {
      padding: 4rem 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      position: relative;
    }

    h2::after {
      content: "";
      display: block;
      width: 50px;
      height: 4px;
      background: #fff;
      margin-top: 0.5rem;
      border-radius: 2px;
    }

    .section-content {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #ddd;
    }

    footer {
      background-color: #000;
      padding: 2rem;
      text-align: center;
      border-top: 2px solid #444;
      font-size: 0.9rem;
      color: #888;
    }

    /* Drummy shapes */
    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #555;
      display: inline-block;
      margin: 0 5px;
    }

    .drum-line {
      height: 4px;
      background: #555;
      margin: 1rem 0;
      border-radius: 2px;
    }

    /* Button style */
    .btn {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      margin-top: 1rem;
      color: #000;
      background-color: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <header>
    <h1>Drumadon</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#book">Book a Trial Lesson</a>
      <a href="#pricing">Pricing</a>
      <a href="#resources">Free Resources</a>
    </nav>
  </header>

  <section id="about">
    <h2>About Drumadon</h2>
    <div class="section-content">
      xxxxx<br><br>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
  </section>

  <section id="book">
    <h2>Book a Trial Lesson</h2>
    <div class="section-content">
      Fill in your info to schedule: xxxxx<br><br>
      <a href="xxxxx" class="btn">Book Now</a>
    </div>
  </section>

  <section id="pricing">
    <h2>Pricing</h2>
    <div class="section-content">
      xxxxx<br>
      <div class="drum-line"></div>
      xxxxx<br>
      <div class="drum-line"></div>
      xxxxx
    </div>
  </section>

  <section id="resources">
    <h2>Free Resources</h2>
    <div class="section-content">
      xxxxx<br><br>
      <a href="xxxxx" class="btn">Access Resources</a>
    </div>
  </section>

  <footer>
    &copy; 2026 Drumadon | Contact: xxxxx | Location: xxxxx
  </footer>
</body>
</html>
